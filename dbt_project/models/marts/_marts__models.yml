version: 2

models:
  - name: dim_geography
    description: "Geography dimension — cities, counties, states with FIPS codes and coordinates"
    columns:
      - name: geo_id
        description: "Primary key — FIPS code"
        tests: [unique, not_null]
      - name: state_name
        tests: [not_null]

  - name: dim_time
    description: "Time dimension — date spine for joining fact tables"
    columns:
      - name: date_id
        tests: [unique, not_null]

  - name: fct_economics
    description: "Economic metrics — wages, employment, unemployment by geography and time"

  - name: fct_housing
    description: "Housing metrics — rents, home values, affordability by geography and time"

  - name: fct_crime
    description: "Crime statistics — rates per 100k by geography and time"

  - name: fct_quality_of_life
    description: "Quality of life — cost of living index, composite scores by geography"
