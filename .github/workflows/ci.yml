name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check ingestion/ frontend/ scripts/

      - name: Test
        run: pytest ingestion/tests/ -v

      - name: dbt compile
        run: |
          cd dbt_project
          dbt deps
          dbt compile --target dev || true
